<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roonburg Rezeptseite</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --card: rgba(0, 0, 0, 0.56);
      --card-soft: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.10);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.74);
      --accent: #ff3333;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.76), rgba(0, 0, 0, 0.9)),
        url("https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=1800&q=80") center/cover no-repeat;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 12% 18%, rgba(175, 24, 24, 0.26), transparent 26%),
        radial-gradient(circle at 82% 70%, rgba(130, 0, 35, 0.22), transparent 26%);
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 18px 12px 40px;
    }

    .hero {
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 20px 16px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 16px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-wrap img {
      width: min(260px, 72vw);
      max-width: 100%;
      height: auto;
      display: inline-block;
    }

    .header-actions {
      margin-top: 14px;
      text-align: center;
    }

    .ingredients-btn {
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .ingredients-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .search-wrap {
      margin-bottom: 14px;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      display: none;
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 30;
      backdrop-filter: blur(10px);
    }

    .search-suggestions.active {
      display: block;
    }

    .search-suggestion {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.18s ease;
    }

    .search-suggestion:last-child {
      border-bottom: 0;
    }

    .search-suggestion:hover {
      background: rgba(255, 51, 51, 0.14);
    }

    .search-suggestion-title {
      display: block;
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .search-suggestion-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .category-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    .category-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 12px 10px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s ease;
      min-height: 54px;
    }

    .category-btn:hover,
    .category-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .cocktail-section {
      margin-top: 16px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cocktail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .cocktail-tile {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: 0.2s ease;
      min-height: 86px;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      line-height: 1.35;
      color: #ffffff;
    }

    .cocktail-tile.visible {
      display: flex;
    }

    .cocktail-tile:hover,
    .cocktail-tile.active {
      border-color: var(--accent);
      background: rgba(255, 51, 51, 0.12);
      transform: translateY(-2px);
    }

    .empty-state {
      display: none;
      padding: 18px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      text-align: center;
    }

    .recipe-panel {
      display: none;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .recipe-panel.active {
      display: block;
    }

    .recipe-head {
      margin-bottom: 14px;
    }

    .recipe-title {
      margin: 0;
      font-size: clamp(24px, 4.8vw, 36px);
      font-weight: 900;
      line-height: 1.05;
    }

    .recipe-category {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .recipe-alcohol {
      margin-top: 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    .recipe-layout {
      display: block;
    }

    .recipe-text {
      width: 100%;
    }

    .recipe-block {
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .recipe-block h3 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .ingredients-list,
    .steps-list {
      margin: 0;
      padding-left: 20px;
    }

    .ingredients-list li,
    .steps-list li {
      margin-bottom: 9px;
      line-height: 1.55;
      color: rgba(255,255,255,0.92);
    }

    .recipe-image {
      margin-top: 16px;
    }

    .recipe-image img {
      width: 100%;
      height: auto;
      max-height: 320px;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #111;
      box-shadow: var(--shadow);
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-content {
      width: min(1100px, 100%);
      max-height: 90vh;
      background: rgba(10, 10, 10, 0.98);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .overlay-header h2 {
      margin: 0;
      font-size: 22px;
      color: var(--accent);
    }

    .close-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 20px;
      cursor: pointer;
    }

    .overlay-table-wrap {
      overflow: auto;
      padding: 0 20px 20px;
    }

    .overlay-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    .overlay-table th,
    .overlay-table td {
      text-align: left;
      vertical-align: top;
      padding: 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .overlay-table th {
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .overlay-table td {
      color: rgba(255,255,255,0.92);
      line-height: 1.5;
      white-space: pre-line;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px 10px 32px;
      }

      .hero {
        padding: 16px 12px 14px;
        border-radius: 22px;
      }

      .category-nav {
        grid-template-columns: repeat(2, 1fr);
      }

      .cocktail-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cocktail-tile {
        min-height: 76px;
        font-size: 14px;
        padding: 10px;
      }

      .recipe-panel {
        padding: 14px;
      }

      .recipe-image img {
        max-height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo-wrap">
        <img src="https://roonburg.de/media/default/assets/config/roonburg/images/roonburg-logo.png" alt="Roonburg Logo" />
        <div class="header-actions">
          <button id="openIngredientsBtn" class="ingredients-btn" type="button">
            Inhaltsliste öffnen
          </button>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Cocktail suchen..."
            autocomplete="off"
          />
          <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
      </div>

      <nav class="category-nav" id="categoryNav">
        <button class="category-btn" data-category="PARTY-FAVORITES">Party Favorites</button>
        <button class="category-btn" data-category="VACAY-VIBES">Vacay Vibes</button>
        <button class="category-btn" data-category="FRESH-ZESTY">Fresh &amp; Zesty</button>
        <button class="category-btn" data-category="MAIN-CHARACTER-ENERGY">Main Character</button>
        <button class="category-btn" data-category="SPIRIT-FORWARD">Spirit Forward</button>
        <button class="category-btn" data-category="ZERO-PROOF">Zero Proof</button>
      </nav>
    </section>

    <section class="cocktail-section">
      <h2 class="section-title">Cocktails</h2>

      <div class="cocktail-grid" id="cocktailGrid">
        <button class="cocktail-tile visible" data-id="whiskey-sour" data-category="FRESH-ZESTY">Whiskey Sour</button>
        <button class="cocktail-tile visible" data-id="new-york-sour" data-category="FRESH-ZESTY">New York Sour - Twist</button>

        <button class="cocktail-tile visible" data-id="zombie" data-category="VACAY-VIBES">Zombie</button>
        <button class="cocktail-tile visible" data-id="blue-lagoon" data-category="VACAY-VIBES">Blue Lagoon</button>
        <button class="cocktail-tile visible" data-id="pina-colada" data-category="VACAY-VIBES">Pina Colada</button>
        <button class="cocktail-tile visible" data-id="frozen-daiquiri" data-category="VACAY-VIBES">Frozen Daiquiri Mango / Erdbeere</button>
        <button class="cocktail-tile visible" data-id="bahama-mama" data-category="VACAY-VIBES">Bahama Mama</button>
        <button class="cocktail-tile visible" data-id="solero" data-category="VACAY-VIBES">Solero</button>

        <button class="cocktail-tile visible" data-id="negroni" data-category="SPIRIT-FORWARD">Negroni</button>
        <button class="cocktail-tile visible" data-id="martini" data-category="SPIRIT-FORWARD">Martini</button>
        <button class="cocktail-tile visible" data-id="boulevardier" data-category="SPIRIT-FORWARD">Boulevardier</button>

        <button class="cocktail-tile visible" data-id="long-island" data-category="PARTY-FAVORITES">Long Island Ice Tea</button>
        <button class="cocktail-tile visible" data-id="moscow-mule" data-category="PARTY-FAVORITES">Moscow Mule</button>
        <button class="cocktail-tile visible" data-id="mojito" data-category="PARTY-FAVORITES">Mojito</button>
        <button class="cocktail-tile visible" data-id="caipirinha" data-category="PARTY-FAVORITES">Caipirinha</button>
        <button class="cocktail-tile visible" data-id="cuba-libre" data-category="PARTY-FAVORITES">Cuba Libre</button>
        <button class="cocktail-tile visible" data-id="tequila-sunrise" data-category="PARTY-FAVORITES">Tequila Sunrise</button>
        <button class="cocktail-tile visible" data-id="sex-on-the-beach" data-category="PARTY-FAVORITES">Sex on the Beach</button>
        <button class="cocktail-tile visible" data-id="touchdown" data-category="PARTY-FAVORITES">Touchdown</button>
        <button class="cocktail-tile visible" data-id="paloma" data-category="PARTY-FAVORITES">Paloma</button>

        <button class="cocktail-tile visible" data-id="pornstar-martini" data-category="MAIN-CHARACTER-ENERGY">Pornstar Martini</button>

      </div>

      <div class="empty-state" id="emptyState">Kein Cocktail gefunden.</div>

      <section class="recipe-panel active" id="recipePanel">
        <div class="recipe-head">
          <h1 class="recipe-title" id="recipeTitle">Whiskey Sour</h1>
          <div class="recipe-category" id="recipeCategory">Fresh &amp; Zesty</div>
          <div class="recipe-alcohol" id="recipeAlcohol">ca. 16 % vol</div>
        </div>

        <div class="recipe-layout">
          <div class="recipe-text">
            <div class="recipe-block">
              <h3>Inhalt</h3>
              <ul class="ingredients-list" id="ingredientsList"></ul>
            </div>

            <div class="recipe-block">
              <h3>Schritt für Schritt</h3>
              <ol class="steps-list" id="stepsList"></ol>
            </div>

            <div class="recipe-image">
              <img id="recipeImage" src="https://images.pexels.com/photos/28834354/pexels-photo-28834354.jpeg" alt="Whiskey Sour">
            </div>
          </div>
        </div>
      </section>
    </section>

    <footer class="footer">Roonburg interne Rezeptseite</footer>
  </main>

  <div id="ingredientsOverlay" class="overlay">
    <div class="overlay-content">
      <div class="overlay-header">
        <h2>Inhaltslisten</h2>
        <button id="closeIngredientsBtn" class="close-btn" type="button">×</button>
      </div>

      <div class="overlay-table-wrap">
        <table class="overlay-table">
          <thead>
            <tr>
              <th>Cocktail</th>
    
              <th>Inhaltsliste</th>
            </tr>
          </thead>
          <tbody id="overlayTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

    const categoryButtons = document.querySelectorAll(".category-btn");
    const cocktailTiles = document.querySelectorAll(".cocktail-tile");
    const searchInput = document.getElementById("searchInput");
    const searchSuggestions = document.getElementById("searchSuggestions");
    const emptyState = document.getElementById("emptyState");

    const recipeTitle = document.getElementById("recipeTitle");
    const recipeCategory = document.getElementById("recipeCategory");
    const recipeAlcohol = document.getElementById("recipeAlcohol");
    const recipeImage = document.getElementById("recipeImage");
    const ingredientsList = document.getElementById("ingredientsList");
    const stepsList = document.getElementById("stepsList");

    const overlay = document.getElementById("ingredientsOverlay");
    const openIngredientsBtn = document.getElementById("openIngredientsBtn");
    const closeIngredientsBtn = document.getElementById("closeIngredientsBtn");
    const overlayTableBody = document.getElementById("overlayTableBody");

    let activeCategory = "all";

    function showRecipe(id) {
      const recipe = recipes[id];
      if (!recipe) return;

      recipeTitle.textContent = recipe.title;
      recipeCategory.textContent = recipe.category;
      recipeAlcohol.textContent = recipe.alcoholVolume || "-";
      recipeImage.src = recipe.image;
      recipeImage.alt = recipe.title;

      ingredientsList.innerHTML = recipe.ingredients
        .map(item => `<li>${item}</li>`)
        .join("");

      stepsList.innerHTML = recipe.steps
        .map(item => `<li>${item}</li>`)
        .join("");

      cocktailTiles.forEach(tile => tile.classList.remove("active"));
      const activeTile = document.querySelector(`.cocktail-tile[data-id="${id}"]`);
      if (activeTile) activeTile.classList.add("active");
    }

    function recipeMatchesSearch(recipe, term) {
      const searchPool = [
        recipe.title,
        recipe.category,
        recipe.alcoholVolume || "",
        ...(recipe.ingredients || []),
        ...(recipe.steps || [])
      ].join(" ").toLowerCase();

      return searchPool.includes(term);
    }

    function renderSuggestions() {
      const term = searchInput.value.trim().toLowerCase();

      if (!term) {
        searchSuggestions.innerHTML = "";
        searchSuggestions.classList.remove("active");
        return;
      }

      const matches = Object.entries(recipes)
        .filter(([id, recipe]) => recipeMatchesSearch(recipe, term))
        .sort((a, b) => a[1].title.localeCompare(b[1].title, "de"))
        .slice(0, 8);

      if (matches.length === 0) {
        searchSuggestions.innerHTML = "";
        searchSuggestions.classList.remove("active");
        return;
      }

      searchSuggestions.innerHTML = matches.map(([id, recipe]) => `
        <button class="search-suggestion" type="button" data-id="${id}">
          <span class="search-suggestion-title">${recipe.title}</span>
          <span class="search-suggestion-meta">${recipe.category} · ${recipe.alcoholVolume || "-"}</span>
        </button>
      `).join("");

      searchSuggestions.classList.add("active");

      searchSuggestions.querySelectorAll(".search-suggestion").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.id;
          searchInput.value = recipes[id].title;
          showRecipe(id);
          filterCocktails();
          searchSuggestions.innerHTML = "";
          searchSuggestions.classList.remove("active");

          document.getElementById("recipePanel").scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        });
      });
    }

    function filterCocktails() {
      const term = searchInput.value.trim().toLowerCase();
      let visibleCount = 0;

      cocktailTiles.forEach(tile => {
        const category = tile.dataset.category;
        const id = tile.dataset.id;
        const recipe = recipes[id];

        let shouldShow = false;

        if (term) {
          shouldShow = recipe && recipeMatchesSearch(recipe, term);
        } else {
          shouldShow = activeCategory === "all" || category === activeCategory;
        }

        if (shouldShow) {
          tile.classList.add("visible");
          visibleCount++;
        } else {
          tile.classList.remove("visible");
          tile.classList.remove("active");
        }
      });

      emptyState.style.display = visibleCount === 0 ? "block" : "none";
      renderSuggestions();
    }

    function renderOverlayTable() {
      const sortedRecipes = Object.values(recipes).sort((a, b) =>
        a.title.localeCompare(b.title, "de")
      );

      overlayTableBody.innerHTML = sortedRecipes.map(recipe => `
        <tr>
          <td>${recipe.title}</td>
          <td>${recipe.ingredients.join("\n")}</td>
        </tr>
      `).join("");
    }

    categoryButtons.forEach(button => {
      button.addEventListener("click", () => {
        categoryButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        activeCategory = button.dataset.category;
        filterCocktails();
      });
    });

    cocktailTiles.forEach(tile => {
      tile.addEventListener("click", () => {
        showRecipe(tile.dataset.id);
        document.getElementById("recipePanel").scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      });
    });

    searchInput.addEventListener("input", filterCocktails);

    searchInput.addEventListener("focus", () => {
      renderSuggestions();
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-box")) {
        searchSuggestions.classList.remove("active");
      }
    });

    if (openIngredientsBtn && closeIngredientsBtn && overlay && overlayTableBody) {
      openIngredientsBtn.addEventListener("click", () => {
        renderOverlayTable();
        overlay.classList.add("active");
      });

      closeIngredientsBtn.addEventListener("click", () => {
        overlay.classList.remove("active");
      });

      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) {
          overlay.classList.remove("active");
        }
      });
    }

    showRecipe("whiskey-sour");
    filterCocktails();
  </script>
